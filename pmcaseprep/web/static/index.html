<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PM Case Prep</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <h1>PM Case Prep</h1>
    <span id="listening" class="pill" hidden>listening…</span>
    <div id="status" class="status">connecting…</div>
  </header>

  <div id="reconnect" class="reconnect" hidden>
    Connection lost. <button id="reloadBtn">Reconnect</button>
  </div>

  <div id="case" class="case-card">
    <div class="case-meta"><span id="caseArchetype"></span></div>
    <h2 id="caseTitle">Loading case…</h2>
    <p id="casePrompt"></p>
  </div>

  <div id="log" class="log" aria-live="polite"></div>

  <div class="composer">
    <textarea id="textInput" rows="2"
      placeholder="Think out loud — talk (mic is always on) or type. The interviewer stays quiet unless you ask or finish."></textarea>
    <div class="composer-actions">
      <button id="sendBtn">Send</button>
      <button id="micBtn" class="toggle">🎤 Mic: on</button>
      <button id="hintBtn" class="ghost">Ask for a hint</button>
      <button id="doneBtn" class="ghost">Done &amp; grade</button>
    </div>
  </div>

  <div id="scorecard" class="scorecard" hidden></div>

  <script src="/static/app.js"></script>
</body>
</html>
