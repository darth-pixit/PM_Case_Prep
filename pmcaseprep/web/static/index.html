<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PM Case Prep</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <h1>PM Case Prep</h1>
    <div id="status" class="status"></div>
  </header>

  <div id="reconnect" class="reconnect" hidden>
    Connection lost. <button id="reloadBtn">Reconnect</button>
  </div>

  <main class="stage">
    <div id="case" class="case-card">
      <div class="case-meta"><span id="caseArchetype"></span></div>
      <h2 id="caseTitle">Loading case…</h2>
      <p id="casePrompt"></p>
    </div>

    <!-- Prominent presence indicator: listening / responding / grading -->
    <div id="presence" class="presence">
      <span id="orb" class="orb connecting"></span>
      <span id="stateLabel">connecting…</span>
    </div>

    <!-- Only the interviewer's LATEST message is shown — like a real interview. -->
    <div id="mayaMsg" class="maya-current" hidden>
      <span class="who">Interviewer</span>
      <div id="mayaText"></div>
    </div>
  </main>

  <div class="composer">
    <textarea id="textInput" rows="2"
      placeholder="Think out loud — talk (mic is always on) or type. The interviewer stays quiet unless you ask or finish."></textarea>
    <div class="composer-actions">
      <button id="sendBtn">Send</button>
      <button id="micBtn" class="toggle">🎤 Mic: on</button>
      <button id="hintBtn" class="ghost">Ask for a hint</button>
      <button id="doneBtn" class="ghost">Done &amp; grade</button>
    </div>
  </div>

  <div id="gradingOverlay" class="grading-overlay" hidden>
    <div class="grading-box">
      <span class="orb responding big"></span>
      <p id="gradeStage">Re-reading your full transcript…</p>
      <div class="progress-track"><div id="gradeFill" class="progress-fill"></div></div>
      <p id="gradePct" class="grade-pct">0%</p>
    </div>
  </div>

  <div id="scorecard" class="scorecard" hidden></div>

  <script src="/static/app.js"></script>
</body>
</html>
